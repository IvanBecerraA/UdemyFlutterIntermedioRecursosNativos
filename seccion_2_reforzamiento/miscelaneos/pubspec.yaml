name: miscelaneos
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: 3.11.5

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_compass: ^0.8.1
  flutter_riverpod: 2.3.6
  geolocator: 9.0.2
  go_router: 17.3.0
  google_fonts: 8.1.0
  google_maps_flutter: 2.2.6
  local_auth: 2.1.6
  permission_handler: 12.0.3
  quick_actions: 1.0.5
  sensors_plus: 7.0.0
  share_plus: ^13.1.0

dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_lints: 6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/compass/
